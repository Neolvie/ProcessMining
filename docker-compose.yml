services:
  app:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./logs:/data/logs
      - ./metadata:/data/metadata:ro
    env_file:
      - path: .env
        required: false
    environment:
      - LOGS_DIR=/data/logs
      - METADATA_DIR=/data/metadata
      - TZ=Europe/Moscow
      - TZ_OFFSET_HOURS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
